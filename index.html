<!DOCTYPE html>
<html>
<head>
<title>5+5 Patata Clicker</title>

<style>

body{
    font-family: Arial;
    text-align:center;
    background:#f2e2b6;
    overflow:hidden;
}

#patata{
    width:250px;
    cursor:pointer;
    transition:transform 0.1s;
}

#patata:active{
    transform:scale(0.95);
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:6px;
}

.worker{
    width:60px;
    position:absolute;
    transition: all 2s linear;
}

.farm{
    width:90px;
    position:absolute;
}

.factory{
    width:110px;
    position:absolute;
}

</style>
</head>

<body>

<h1>🥔 5+5 Patata Clicker</h1>

<h2 id="counter">Patatas: 0</h2>
<h3 id="pps">Patatas per second: 0</h3>

<img id="patata" src="https://files.catbox.moe/srp1ta.png">

<br><br>

<button onclick="buyClickUpgrade()">
Better Click (+1) Cost: <span id="clickCost">10</span>
</button>

<br>

<button onclick="buyFarm()">
Farm 🚜 Cost: <span id="farmCost">5000</span>
</button>

<button onclick="buyFactory()">
Factory 🏭 Cost: <span id="factoryCost">20000</span>
</button>

<br><br>

<button onclick="openEgg()">
Open Meme Egg 🥚 Cost: <span id="eggCost">2500</span>
</button>

<h3>
Potatitios: <span id="potatitios">0</span> |
Tomatitos: <span id="tomatitos">0</span> |
Carrotitos: <span id="carrotitos">0</span> |
SixSevenitos: <span id="sixsevenitos">0</span>
</h3>

<h3>
Farms: <span id="farms">0</span> |
Factories: <span id="factories">0</span>
</h3>

<script>

let patatas = 0

let perClick = 5
let clickCost = 10

let farms = 0
let farmCost = 5000

let factories = 0
let factoryCost = 20000

let eggCost = 2500

let potatitios = 0
let tomatitos = 0
let carrotitos = 0
let sixsevenitos = 0


const patata = document.getElementById("patata")


patata.onclick = function(){

    let clickPower = perClick * (1 + carrotitos*0.2)

    patatas += clickPower

    update()
}


function randomX(){
    return Math.random() * (window.innerWidth - 100)
}

function randomY(){
    return Math.random() * (window.innerHeight - 100)
}


function spawnPet(imgURL){

    const img = document.createElement("img")

    img.src = imgURL
    img.className = "worker"

    img.style.left = randomX()+"px"
    img.style.top = randomY()+"px"

    document.body.appendChild(img)

    setInterval(function(){

        img.style.left = randomX()+"px"
        img.style.top = randomY()+"px"

    },2000)
}


function spawnFarm(){

    const img = document.createElement("img")

    img.src = "https://files.catbox.moe/an1w50.png"
    img.className = "farm"

    img.style.left = randomX()+"px"
    img.style.top = randomY()+"px"

    document.body.appendChild(img)
}


function spawnFactory(){

    const img = document.createElement("img")

    img.src = "https://files.catbox.moe/6ibzxj.png"
    img.className = "factory"

    img.style.left = randomX()+"px"
    img.style.top = randomY()+"px"

    document.body.appendChild(img)
}


function openEgg(){

    if(patatas < eggCost) return

    patatas -= eggCost

    let roll = Math.random()

    if(roll < 0.50){

        potatitios++
        spawnPet("https://files.catbox.moe/vzj2dz.png")
        alert("You got Potatitio 🥔")

    }

    else if(roll < 0.75){

        tomatitos++
        spawnPet("https://files.catbox.moe/03vj56.png")
        alert("You got Tomatito 🍅")

    }

    else if(roll < 0.90){

        carrotitos++
        spawnPet("https://files.catbox.moe/2ohg41.png")
        alert("You got Carrotito 🥕")

    }

    else{

        sixsevenitos++
        spawnPet("https://files.catbox.moe/gsn6qp.png")
        alert("YOU GOT SIXSEVENITO 🔥")

    }

    eggCost = Math.floor(eggCost * 1.25)

    update()
}


function buyClickUpgrade(){

    if(patatas >= clickCost){

        patatas -= clickCost
        perClick++

        clickCost = Math.floor(clickCost * 1.6)

        update()
    }
}


function buyFarm(){

    if(patatas >= farmCost){

        patatas -= farmCost
        farms++

        spawnFarm()

        farmCost = Math.floor(farmCost * 1.5)

        update()
    }
}


function buyFactory(){

    if(patatas >= factoryCost){

        patatas -= factoryCost
        factories++

        spawnFactory()

        factoryCost = Math.floor(factoryCost * 1.6)

        update()
    }
}


function getPPS(){

    let base =
        farms*(75 + tomatitos*15) +
        factories*300

    base += potatitios*30

    base = base * (1 + sixsevenitos*0.5)

    return base
}


function update(){

    document.getElementById("counter").innerText =
    "Patatas: " + Math.floor(patatas)

    document.getElementById("pps").innerText =
    "Patatas per second: " + Math.floor(getPPS())

    document.getElementById("clickCost").innerText = clickCost
    document.getElementById("farmCost").innerText = farmCost
    document.getElementById("factoryCost").innerText = factoryCost
    document.getElementById("eggCost").innerText = eggCost

    document.getElementById("potatitios").innerText = potatitios
    document.getElementById("tomatitos").innerText = tomatitos
    document.getElementById("carrotitos").innerText = carrotitos
    document.getElementById("sixsevenitos").innerText = sixsevenitos

    document.getElementById("farms").innerText = farms
    document.getElementById("factories").innerText = factories
}


setInterval(function(){

    patatas += getPPS()
    update()

},1000)

</script>

</body>
</html>
